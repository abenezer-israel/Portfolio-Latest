<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon · portfolio</title>
  <!-- Google Font + Font Awesome -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="LiveDemo.css">
</head>
<body>
  <div class="coming-soon">
    <div class="badge">
      <i class="fas fa-rocket" style="margin-right: 6px;"></i> NEXT LAUNCH 
    </div>

    <h1>
      <span class="highlight">coming</span> soon
    </h1>
    <p class="subhead">
      A fresh experience is on the horizon. Drop your email and be the first to know.
    </p>

    <!-- REPLACED COUNTDOWN WITH PROFESSIONAL PROGRESS BAR -->
    <div class="progress-section">
      <div class="progress-label">
        <span><i class="fas fa-code" style="margin-right: 6px; opacity: 0.6;"></i> progress</span>
        <span>68%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width: 68%;"></div>
      </div>
      <div class="progress-status">
        <i class="fas fa-spinner fa-pulse"></i> building something great
      </div>
    </div>

    <div class="notify-section">
      <form class="notify-form" action="#" method="post">
        <input type="email" placeholder="Your email address" required aria-label="email for notification" />
        <button type="submit">
          <i class="fas fa-paper-plane"></i> notify me
        </button>
      </form>
      <p class="disclaimer">
        <i class="fas fa-lock" style="opacity: 0.5; margin-right: 6px;"></i> no spam, just a heads-up.
      </p>
    </div>

    <div class="social-links">
      <a href="#" aria-label="twitter"><i class="fab fa-twitter"></i></a>
      <a href="#" aria-label="instagram"><i class="fab fa-instagram"></i></a>
      <a href="#" aria-label="github"><i class="fab fa-github"></i></a>
      <a href="#" aria-label="linkedin"><i class="fab fa-linkedin-in"></i></a>
    </div>

    <div class="portfolio-note">
      <i class="fas fa-check-circle"></i>
      <span>Built by Abeni Israel</span>
      <i class="fas fa-arrow-right" style="font-size: 0.6rem;"></i>
    </div>
  </div>
</body>
</html>
